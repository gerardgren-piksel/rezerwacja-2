name: Book class

on:
  workflow_dispatch:
    inputs:
      booking_rules:
        description: "Każda linia: NAZWA | DZIEŃ | GODZINA"
        required: false
        default: ""
      days_ahead:
        description: "Ile dni do przodu"
        required: false
        default: "7"

  schedule:
    # 00:17 czasu polskiego latem (UTC+2)
    - cron: "17 22 * * *"

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Prepare env
        shell: bash
        run: |
          echo "EFITNESS_LOGIN=${{ secrets.EFITNESS_LOGIN }}" >> $GITHUB_ENV
          echo "EFITNESS_PASSWORD=${{ secrets.EFITNESS_PASSWORD }}" >> $GITHUB_ENV

          {
            echo "BOOKING_RULES<<EOF"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.booking_rules }}" ]; then
              echo "${{ github.event.inputs.booking_rules }}"
            else
              echo "${{ vars.BOOKING_RULES }}"
            fi
            echo "EOF"
          } >> $GITHUB_ENV

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.days_ahead }}" ]; then
            echo "DAYS_AHEAD=${{ github.event.inputs.days_ahead }}" >> $GITHUB_ENV
          else
            echo "DAYS_AHEAD=7" >> $GITHUB_ENV
          fi

      - name: Debug variables
        run: |
          echo "DAYS_AHEAD=$DAYS_AHEAD"
          echo "BOOKING_RULES:"
          echo "$BOOKING_RULES"

      - name: Run booking
        run: python book.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-debug
          path: output/
          if-no-files-found: ignore